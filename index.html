<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff6a00">
<title>Business Profile</title>
<!-- Preconnect for speed -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   WANZA MARKETING — index.html v7 PREMIUM
   ✅ All bugs fixed | Pay Now | Ads Carousel | Share
   ═══════════════════════════════════════════════ */
:root {
  --org1:   #ff6a00;
  --org2:   #ff9f00;
  --org3:   #ffb84d;
  --bg:     #fff8f0;
  --surf:   #ffffff;
  --card:   #ffffff;
  --bdr:    rgba(255,106,0,.12);
  --bdr2:   rgba(255,106,0,.2);
  --txt:    #1a1a1a;
  --muted:  #888;
  --grn:    #00c97e;
  --red:    #ff4757;
  --shadow: 0 4px 24px rgba(255,106,0,.13);
  --shadow2:0 8px 40px rgba(255,106,0,.2);
  --max:    560px;
  --r1:8px; --r2:14px; --r3:20px; --pill:999px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Poppins',sans-serif;font-size:15px;line-height:1.6;
  background:var(--bg);color:var(--txt);min-height:100dvh;
  overflow-x:hidden;-webkit-tap-highlight-color:transparent
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 0% 0%,rgba(255,106,0,.07),transparent 55%),
    radial-gradient(ellipse 60% 40% at 100% 100%,rgba(255,159,0,.09),transparent 55%)
}

/* ── LOADER ── */
#ls{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(135deg,#fff8f0,#fff3e0);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .4s ease
}
#ls.out{opacity:0;pointer-events:none}
.ld-logo{
  width:72px;height:72px;border-radius:20px;
  background:linear-gradient(135deg,var(--org1),var(--org2));
  display:flex;align-items:center;justify-content:center;font-size:2rem;
  box-shadow:0 8px 32px rgba(255,106,0,.4);
  animation:pulse 1.4s ease infinite
}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.ld-ring{
  width:36px;height:36px;
  border:3px solid rgba(255,106,0,.2);border-top-color:var(--org1);
  border-radius:50%;animation:spin .7s linear infinite
}
.ld-txt{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:600}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PAGE WRAPPER ── */
#pg{position:relative;z-index:1;max-width:var(--max);margin:0 auto;padding-bottom:80px;display:none}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.au{animation:up .4s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}

/* ── HEADER STRIP ── */
.page-header{
  background:linear-gradient(135deg,var(--org1),var(--org2));
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 20px rgba(255,106,0,.3)
}
.ph-brand{display:flex;align-items:center;gap:10px}
.ph-logo{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.22);
  display:flex;align-items:center;justify-content:center;font-size:1rem;overflow:hidden}
.ph-logo img{width:100%;height:100%;object-fit:cover}
.ph-name{color:#fff;font-size:14px;font-weight:700;letter-spacing:.3px}
/* Share button in header */
.ph-share{
  background:rgba(255,255,255,.2);color:#fff;
  border:1px solid rgba(255,255,255,.35);
  border-radius:var(--pill);padding:5px 14px;font-size:12px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:background .2s ease;font-family:'Poppins',sans-serif
}
.ph-share:active{transform:scale(.94)}

/* ── HERO ── */
.hero{padding:clamp(28px,7vw,44px) 20px 20px;text-align:center;position:relative}
/* Profile image */
.biz-logo{
  width:clamp(88px,22vw,108px);height:clamp(88px,22vw,108px);
  border-radius:50%;object-fit:cover;
  border:4px solid white;
  box-shadow:0 8px 32px rgba(255,106,0,.3),0 0 0 6px rgba(255,106,0,.1);
  margin:0 auto 0;display:block
}
.biz-logo-placeholder{
  width:clamp(88px,22vw,108px);height:clamp(88px,22vw,108px);
  border-radius:50%;
  background:linear-gradient(135deg,var(--org1),var(--org2));
  margin:0 auto 0;display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;
  box-shadow:0 8px 32px rgba(255,106,0,.3),0 0 0 6px rgba(255,106,0,.12)
}
/* Name BELOW image — centered, bold, premium */
.biz-name{
  font-size:clamp(1.5rem,6.5vw,2rem);font-weight:800;line-height:1.2;
  background:linear-gradient(135deg,var(--org1),var(--org2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  padding:0 12px;margin-top:14px
}
.biz-type{
  display:inline-block;margin-top:8px;
  background:linear-gradient(135deg,var(--org1),var(--org2));
  color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  border-radius:var(--pill);padding:4px 14px
}
.biz-addr{font-size:12.5px;color:var(--muted);margin-top:8px;padding:0 16px;line-height:1.5}
.biz-addr span{color:var(--org1)}
.biz-desc{
  font-size:13px;color:#555;margin:10px auto 0;max-width:380px;
  line-height:1.7;padding:0 16px
}
.hero-divider{
  margin:18px auto 0;width:60px;height:4px;border-radius:2px;
  background:linear-gradient(90deg,var(--org1),var(--org2))
}

/* ── CTA BUTTONS ── */
.cta{padding:16px 16px 8px}
.cta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.cta-btn{
  flex:1 1 80px;min-width:80px;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  min-height:50px;padding:0 16px;border-radius:var(--pill);border:none;cursor:pointer;
  font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap;
  transition:transform .2s ease,box-shadow .2s ease;-webkit-user-select:none;user-select:none;
  box-shadow:0 4px 16px rgba(0,0,0,.14)
}
.cta-btn:active{transform:scale(.92)}
@media(hover:hover){.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}}
.btn-call{background:linear-gradient(135deg,#00b857,#00e073);color:#fff}
.btn-wa{background:linear-gradient(135deg,#25d366,#075e54);color:#fff}
.btn-email{background:linear-gradient(135deg,#25d366,#075e54);color:#fff}

/* ── PAY NOW BUTTON (NEW) ── */
.btn-pay-wrap{padding:0 16px 14px}
.btn-pay{
  width:100%;min-height:54px;
  background:linear-gradient(135deg,#ff6a00,#ff9f00,#ffb84d);
  background-size:200% 200%;
  color:#fff;border:none;border-radius:var(--pill);cursor:pointer;
  font-family:'Poppins',sans-serif;font-size:15px;font-weight:800;
  letter-spacing:.5px;text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 6px 28px rgba(255,106,0,.5),0 0 0 0 rgba(255,106,0,.4);
  animation:payGlow 2.2s ease-in-out infinite;
  transition:transform .2s ease
}
.btn-pay:active{transform:scale(.97)}
@keyframes payGlow{
  0%,100%{box-shadow:0 6px 28px rgba(255,106,0,.45),0 0 0 0 rgba(255,106,0,.3)}
  50%{box-shadow:0 8px 36px rgba(255,106,0,.7),0 0 0 10px rgba(255,106,0,0)}
}

/* ── SECTION CARDS ── */
.sec{padding:0 16px 16px}
.sec-card{
  background:var(--card);border:1px solid var(--bdr);
  border-radius:var(--r3);overflow:hidden;
  box-shadow:var(--shadow)
}
.sec-hd{
  padding:14px 18px;border-bottom:2px solid var(--bdr);
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,rgba(255,106,0,.04),rgba(255,159,0,.02))
}
.sec-ic{font-size:1.1rem}
.sec-tt{font-size:14px;font-weight:700;color:var(--txt)}

/* ── SOCIAL GRID ── */
.soc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,220px),1fr));gap:10px;padding:12px}
.soc-card{
  background:linear-gradient(135deg,#fff,#fff8f0);
  border:1.5px solid var(--bdr2);border-radius:var(--r2);
  padding:12px 14px;display:flex;align-items:center;gap:12px;
  cursor:pointer;text-decoration:none;
  transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease;
  min-height:48px;overflow:hidden;-webkit-user-select:none;user-select:none
}
.soc-card:active{transform:scale(.94)}
@media(hover:hover){.soc-card:hover{transform:translateY(-3px);border-color:var(--org1);box-shadow:0 8px 24px rgba(255,106,0,.15)}}
.soc-ico{
  width:38px;height:38px;border-radius:10px;overflow:hidden;
  background:linear-gradient(135deg,rgba(255,106,0,.08),rgba(255,159,0,.06));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  border:1px solid var(--bdr)
}
.soc-ico img{width:100%;height:100%;object-fit:cover}
.soc-ico span{font-size:1.2rem;line-height:1}
.soc-info{flex:1;overflow:hidden;min-width:0}
.soc-nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.soc-sub{font-size:11px;color:var(--muted);margin-top:1px}
.soc-arr{color:var(--org2);font-size:1rem;flex-shrink:0;font-weight:700}

/* ── ADS CAROUSEL (NEW) ── */
.ads-sec{padding:0 16px 16px}
.ads-sec .sec-card{overflow:hidden}
.ads-carousel{position:relative;overflow:hidden;border-radius:var(--r2);margin:10px}
.ads-track{display:flex;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.ads-slide{flex:0 0 100%;position:relative;cursor:pointer;overflow:hidden}
.ads-slide img,.ads-slide video{
  width:100%;max-height:220px;object-fit:cover;display:block;
  border-radius:var(--r2);
}
.ads-slide-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(0,0,0,.6),transparent);
  padding:20px 14px 12px;border-radius:0 0 var(--r2) var(--r2)
}
.ads-slide-title{color:#fff;font-size:13px;font-weight:700;line-height:1.3}
.ads-action-btn{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:6px;background:rgba(255,255,255,.2);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:11px;font-weight:600;font-family:'Poppins',sans-serif;
  padding:4px 12px;border-radius:var(--pill);cursor:pointer
}
.ads-dots{display:flex;justify-content:center;gap:6px;padding:10px 0 4px}
.ads-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--bdr2);transition:all .3s ease;cursor:pointer
}
.ads-dot.on{background:var(--org1);width:20px;border-radius:4px}
.ads-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.85);backdrop-filter:blur(4px);
  border:none;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:2;
  transition:background .2s ease
}
.ads-nav:hover{background:#fff}
.ads-prev{left:8px}
.ads-next{right:8px}

/* ── RATING ── */
.rate-sec{padding:0 16px 16px}
.rate-card{
  background:var(--card);border:1px solid var(--bdr);border-radius:var(--r3);
  padding:clamp(20px,5vw,30px) 16px;text-align:center;
  box-shadow:var(--shadow)
}
.rate-card h3{font-size:17px;font-weight:700;margin-bottom:5px;color:var(--txt)}
.rate-card p{font-size:13px;color:var(--muted);margin-bottom:20px}
.stars{display:flex;justify-content:center;gap:clamp(4px,2vw,12px)}
.star{
  font-size:clamp(2rem,8vw,2.5rem);background:none;border:none;cursor:pointer;
  filter:grayscale(1) opacity(.25);
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),filter .15s ease;
  line-height:1;min-width:44px;min-height:44px;
  display:inline-flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none
}
.star.on{filter:none}
@media(hover:hover){.star:hover{transform:scale(1.3);filter:none}}

/* ── FEEDBACK ── */
#fb-wrap{display:none}
.fb-card{
  background:var(--card);border:1px solid var(--bdr);border-radius:var(--r3);
  padding:clamp(18px,5vw,26px) 16px;text-align:center;margin-top:12px;
  box-shadow:var(--shadow)
}
.fb-card h3{font-size:16px;font-weight:700;margin-bottom:5px;color:var(--txt)}
.fb-card p{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.fb-ta{
  width:100%;background:#fff8f0;
  border:1.5px solid var(--bdr2);border-radius:var(--r2);
  color:var(--txt);padding:12px;font-family:'Poppins',sans-serif;font-size:14px;
  resize:vertical;min-height:90px;outline:none;
  transition:border-color .2s ease;-webkit-appearance:none
}
.fb-ta:focus{border-color:var(--org1);box-shadow:0 0 0 3px rgba(255,106,0,.12)}
.btn-pri{
  width:100%;margin-top:12px;height:50px;
  background:linear-gradient(135deg,var(--org1),var(--org2));
  color:#fff;border:none;border-radius:var(--pill);cursor:pointer;
  font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;
  transition:transform .2s ease,box-shadow .2s ease;
  -webkit-user-select:none;user-select:none;
  box-shadow:0 6px 24px rgba(255,106,0,.35)
}
.btn-pri:active{transform:scale(.97)}
.btn-pri:disabled{opacity:.5;cursor:default;box-shadow:none}

/* ── REVIEWS ── */
#rv-wrap{display:none;margin-top:12px}
.rv-list{display:flex;flex-direction:column;gap:12px}
.rv-card{
  background:var(--card);border:1.5px solid var(--bdr2);
  border-radius:var(--r3);padding:18px;position:relative;overflow:hidden;
  box-shadow:var(--shadow)
}
.rv-card::before{
  content:'"';position:absolute;top:-8px;left:12px;
  font-size:5rem;line-height:1;pointer-events:none;
  background:linear-gradient(135deg,var(--org1),var(--org2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:.12;font-family:Georgia,serif
}
.rv-txt{font-size:13px;line-height:1.7;margin-bottom:14px;color:var(--txt)}
.copy-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;height:46px;
  background:linear-gradient(135deg,var(--org1),var(--org2));
  color:#fff;border:none;border-radius:var(--pill);cursor:pointer;
  font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;
  transition:transform .2s ease,box-shadow .2s ease;
  -webkit-user-select:none;user-select:none;
  box-shadow:0 5px 18px rgba(255,106,0,.3)
}
.copy-btn.done{background:linear-gradient(135deg,#00b857,#00e073);box-shadow:0 5px 18px rgba(0,200,100,.3)}
.copy-btn:active{transform:scale(.96)}
.hint{
  text-align:center;font-size:12px;color:var(--muted);
  margin-top:12px;line-height:1.5;padding:0 8px
}

/* ── OFFER BANNER TICKER ── */
#offer-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  display:none;flex-direction:column
}
.banner-bar{
  padding:11px 50px 11px 16px;
  display:flex;align-items:center;gap:10px;
  overflow:hidden;position:relative
}
.banner-ticker-wrap{flex:1;overflow:hidden;position:relative;height:22px}
.banner-ticker{
  display:flex;gap:80px;white-space:nowrap;
  animation:ticker 20s linear infinite;
  align-items:center;height:100%
}
.banner-ticker span{font-size:13px;font-weight:600;white-space:nowrap}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.banner-close{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:26px;height:26px;border-radius:50%;
  background:rgba(255,255,255,.25);border:none;cursor:pointer;
  font-size:.9rem;display:flex;align-items:center;justify-content:center;
  color:inherit
}
.banner-ico{font-size:1.2rem;flex-shrink:0}

/* ── TOAST ── */
#toast{
  position:fixed;z-index:9998;
  bottom:max(80px,calc(env(safe-area-inset-bottom,0px)+80px));
  left:50%;transform:translateX(-50%) translateY(12px);
  background:#fff;border-radius:var(--pill);
  padding:10px 22px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;
  transition:opacity .3s ease,transform .3s ease;
  white-space:nowrap;max-width:calc(100vw - 32px);text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.15)
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-left:4px solid var(--grn);color:#007a40}
#toast.err{border-left:4px solid var(--red);color:var(--red)}

/* ── FOOTER ── */
.foot{
  text-align:center;
  padding:20px 16px 16px;
  border-top:2px solid var(--bdr);
  margin-top:8px;
  background:linear-gradient(135deg,rgba(255,106,0,.03),rgba(255,159,0,.02));
}
.foot-logo{
  width:44px;height:44px;border-radius:12px;
  object-fit:cover;display:block;
  margin:0 auto 10px;
  border:1.5px solid var(--bdr2);
}
.foot-logo-placeholder{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--org1),var(--org2));
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;margin:0 auto 10px;
}
.foot-name{
  font-size:14px;font-weight:700;
  color:var(--txt);line-height:1.25;
}
.foot-tag{
  font-size:11.5px;color:var(--muted);
  margin-top:3px;line-height:1.4;
}
.foot-links{
  display:flex;justify-content:center;
  align-items:center;gap:8px;
  margin-top:10px;flex-wrap:wrap;
}
.foot-link{
  font-size:11.5px;color:var(--org1);
  text-decoration:none;
  display:inline-flex;align-items:center;gap:4px;
  padding:5px 12px;min-height:30px;
  background:rgba(255,106,0,.07);
  border:1px solid var(--bdr2);
  border-radius:999px;
  transition:border-color .2s ease;
  font-weight:600;
}
.foot-link:active{border-color:var(--org1);}


/* ── ERROR ── */
.err-page{
  min-height:70vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:40px 20px
}
.err-ico{font-size:3rem;margin-bottom:16px}
.err-title{font-size:1.5rem;font-weight:800;margin-bottom:8px;color:var(--txt)}
.err-txt{font-size:13px;color:var(--muted);line-height:1.6}
.empty{text-align:center;padding:26px 16px;color:var(--muted);font-size:13px}

/* ── SKELETON LOADING ── */
.skel{background:linear-gradient(90deg,#f0e6d6 25%,#fce8d0 50%,#f0e6d6 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── RESPONSIVE ── */
@media(max-width:360px){.cta-btn{flex:1 1 100%}.soc-grid{grid-template-columns:1fr}.star{font-size:1.8rem;min-width:38px}}
@media(min-width:480px){.soc-grid{grid-template-columns:1fr 1fr}}
@media(min-width:640px){.sec,.cta,.rate-sec,.ads-sec,.btn-pay-wrap{padding-left:20px;padding-right:20px}.hero{padding-left:20px;padding-right:20px}}
</style>
</head>
<body>

<!-- ── LOADER ── -->
<div id="ls">
  <div class="ld-logo">⭐</div>
  <div class="ld-ring"></div>
  <div class="ld-txt">Loading Profile…</div>
</div>

<!-- ── TOAST ── -->
<div id="toast"></div>

<!-- ── OFFER BANNER ── -->
<div id="offer-banner">
  <div class="banner-bar" id="banner-bar">
    <span class="banner-ico">🔥</span>
    <div class="banner-ticker-wrap">
      <div class="banner-ticker" id="banner-ticker"></div>
    </div>
    <button class="banner-close" onclick="closeBanner()" aria-label="Close">✕</button>

// ── CONFIG — EDIT THIS ──────────────────────────────────────────
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxLGn2KZ18pjLgwOTz15IaeVhToVJdYxpQ9QlLm5ZHuReEPlvkHIFBWLVv9DVa7U3VQ/exec';

// Throttle map
var _th = {};
function throttle(k, ms) {
  var now = Date.now();
  if (_th[k] && now - _th[k] < ms) return false;
  _th[k] = now;
  return true;
}

// Escape HTML
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── TOAST ─────────────────────────────────────────────────────
var _toastTimer;
function toast(msg, type, dur) {
  var el = document.getElementById('toast');
  if (!el) return;
  clearTimeout(_toastTimer);
  el.textContent = msg;
  el.className   = 'show ' + (type || '');
  _toastTimer = setTimeout(function() { el.className = ''; }, dur || 2800);
}

// ── API ───────────────────────────────────────────────────────
function apiGet(action, params, retries) {
  retries = (retries === undefined) ? 2 : retries;
  if (!GAS_URL) return Promise.reject(new Error('GAS_URL not configured'));
  var url = GAS_URL + '?action=' + encodeURIComponent(action);
  Object.keys(params || {}).forEach(function(k) {
    url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  });
  return fetch(url, { method: 'GET' })
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function(text) {
      var d; try { d = JSON.parse(text); } catch(e) { throw new Error('Invalid JSON'); }
      if (d && d.success === false) throw new Error(d.error || 'API error');
      return (d.data !== undefined) ? d.data : d;
    })
    .catch(function(e) {
      if (retries > 0) return new Promise(function(r) { setTimeout(r, 1200); }).then(function() { return apiGet(action, params, retries - 1); });
      throw e;
    });
}

function apiPost(action, body, retries) {
  retries = (retries === undefined) ? 1 : retries;
  if (!GAS_URL) return Promise.reject(new Error('GAS_URL not configured'));
  var payload = Object.assign({ action: action }, body || {});
  return fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload), redirect: 'follow' })
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function(text) {
      var d; try { d = JSON.parse(text); } catch(e) { throw new Error('Invalid JSON'); }
      if (d && d.success === false) throw new Error(d.error || 'API error');
      return (d.data !== undefined) ? d.data : d;
    })
    .catch(function(e) {
      if (retries > 0) return new Promise(function(r) { setTimeout(r, 1500); }).then(function() { return apiPost(action, body, retries - 1); });
      throw e;
    });
}

// ════════════════════════════════════════════════════════════════
//  LOAD CLIENT — Uses single combined API call for speed
// ════════════════════════════════════════════════════════════════
async function loadClient() {
  if (!GAS_URL) { showError('⚙️', 'Setup Required', 'GAS_URL not configured in index.html.'); return; }
  if (!CLIENT_ID) { showError('🔍', 'Client Not Found', 'No client_id in URL. Please scan a valid QR code.'); return; }

  try {
    // Single combined API call — much faster than 4 separate calls
    var result = await apiGet('getClientFull', { client_id: CLIENT_ID });

    // Map all fields correctly
    CLIENT   = result.client   || {};
    SETTINGS = result.settings || {};
    SOCIAL   = Array.isArray(result.social)   ? result.social   : [];
    BANNERS  = Array.isArray(result.banners)  ? result.banners  : [];
    ADS      = Array.isArray(result.ads)      ? result.ads      : [];

    // ✅ DEBUG: Log what we got (check browser console)
    console.log('📦 CLIENT:', CLIENT);

    render(CLIENT, SETTINGS, SOCIAL);

// ── ADS CAROUSEL RENDER (NEW) ─────────────────────────────────
var _adIdx = 0;
var _adTimer = null;
var _adCount = 0;

function renderAds(ads) {
  if (!ads || !ads.length) return '';

  _adCount = ads.length;
  _adIdx   = 0;

  var slides = ads.map(function(ad, i) {
    var media = ad.media_type === 'video'
      ? '<video src="' + esc(ad.media_url) + '" autoplay muted loop playsinline style="width:100%;max-height:220px;object-fit:cover;display:block;border-radius:var(--r2)"></video>'
      : '<img src="' + esc(ad.media_url) + '" alt="' + esc(ad.title || 'Ad') + '" loading="lazy" style="width:100%;max-height:220px;object-fit:cover;display:block;border-radius:var(--r2)" onerror="this.style.display=\'none\'">';

    var actionLabel = ad.action_type === 'call' ? '📞 Call Now'
                    : ad.action_type === 'whatsapp' ? '💬 WhatsApp'
                    : '🔗 Learn More';

    var overlay = (ad.title || ad.redirect_url)
      ? '<div class="ads-slide-overlay">'
          + (ad.title ? '<div class="ads-slide-title">' + esc(ad.title) + '</div>' : '')
          + (ad.redirect_url ? '<button class="ads-action-btn" onclick="adAction(event,\'' + esc(ad.ad_id) + '\',\'' + esc(ad.redirect_url) + '\',\'' + esc(ad.action_type || 'link') + '\')">' + actionLabel + '</button>' : '')
          + '</div>'
      : '';

    return '<div class="ads-slide" onclick="adAction(event,\'' + esc(ad.ad_id) + '\',\'' + esc(ad.redirect_url) + '\',\'' + esc(ad.action_type || 'link') + '\')">'
      + media + overlay + '</div>';
  }).join('');

  var dots = ads.map(function(_, i) {
    return '<div class="ads-dot ' + (i === 0 ? 'on' : '') + '" onclick="goAdSlide(' + i + ')"></div>';
  }).join('');

  var nav = ads.length > 1
    ? '<button class="ads-nav ads-prev" onclick="adNav(event,-1)">‹</button>'
      + '<button class="ads-nav ads-next" onclick="adNav(event,1)">›</button>'
    : '';

  setTimeout(function() { startAdTimer(); }, 100);

  return '<div class="ads-sec au d6"><div class="sec-card">'
    + '<div class="sec-hd"><span class="sec-ic">📢</span><span class="sec-tt">Offers & Promotions</span></div>'
    + '<div class="ads-carousel">'
    + nav
    + '<div class="ads-track" id="ads-track"><div style="display:flex;width:' + (100*ads.length) + '%">'
    + slides + '</div></div>'
    + '</div>'
    + (ads.length > 1 ? '<div class="ads-dots" id="ads-dots">' + dots + '</div>' : '')
    + '</div></div>';
}

function goAdSlide(idx) {
  _adIdx = ((idx % _adCount) + _adCount) % _adCount;
  var track = document.getElementById('ads-track');
  if (track) track.style.transform = 'translateX(-' + (_adIdx * (100 / _adCount)) + '%)';
  document.querySelectorAll('.ads-dot').forEach(function(d, i) {
    d.classList.toggle('on', i === _adIdx);
  });
}

function adNav(e, dir) {
  e.stopPropagation();
  clearTimeout(_adTimer);
  goAdSlide(_adIdx + dir);
  startAdTimer();
}

function startAdTimer() {
  if (_adCount < 2) return;
  clearTimeout(_adTimer);
  _adTimer = setInterval(function() { goAdSlide(_adIdx + 1); }, 4000);
}

function adAction(e, adId, url, type) {
  e.stopPropagation();
  if (!url) return;
  logAction('ad_click', adId);
  if (type === 'call') { window.location.href = 'tel:' + url; }
  else if (type === 'whatsapp') { window.open('https://wa.me/' + url.replace(/\D/g,''), '_blank', 'noopener'); }
  else { window.open(url, '_blank', 'noopener'); }
}

// ── TOUCH SWIPE FOR ADS ───────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var touchStartX = 0;
  document.addEventListener('touchstart', function(e) {
    if (e.target.closest('.ads-carousel')) touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    if (!e.target.closest('.ads-carousel') || !touchStartX) return;
    var dx = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 40) {
      clearTimeout(_adTimer);
      goAdSlide(_adIdx + (dx > 0 ? 1 : -1));
      startAdTimer();
    }
    touchStartX = 0;
  }, { passive: true });
});

function platformEmoji(name) {
  var m = {
    facebook:'📘',instagram:'📸',twitter:'🐦',x:'𝕏',youtube:'▶️',
    tiktok:'🎵',linkedin:'💼',pinterest:'📌',snapchat:'👻',
    telegram:'✈️',whatsapp:'💬',threads:'🧵',website:'🌐',
    blog:'📝',twitch:'🎮',podcast:'🎙️'
  };
  return m[(name||'').toLowerCase().replace(/\s+/g,'')] || '🔗';
}

function fmtCount(n) {
  n = parseInt(n) || 0;
  if (!n) return null;
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/, '') + 'M+';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/, '') + 'K+';
  return n + '+';
}

// ── RATING ────────────────────────────────────────────────────
function setRating(r) {

    s.classList.toggle('on', i < r);

// ── COPY ──────────────────────────────────────────────────────
function copyReview(idx, reviewId) {
  if (!throttle('cp' + idx, 3000)) { toast('Please wait…', ''); return; }
  var rv = REVIEWS[idx];
  if (!rv) return;

  function done() {
    var btn = document.getElementById('cb' + idx);
    if (btn) { btn.textContent = '✅ Copied!'; btn.classList.add('done'); }
    toast('Copied! Redirecting to Google…', 'ok', 3500);
    apiPost('markReviewUsed', { review_id: reviewId }).catch(function() {});
    logAction('review_redirect', CLIENT && CLIENT.google_review_link || '');
    logAction('copy_review', reviewId);
    setTimeout(function() {
      if (CLIENT && CLIENT.google_review_link) window.open(CLIENT.google_review_link, '_blank');
    }, 1600);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(rv.review_text).then(done).catch(function() { fbCopy(rv.review_text, done); });
  } else { fbCopy(rv.review_text, done); }
}

function fbCopy(text, cb) {
  try {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if (cb) cb();
  } catch(e) { toast('Please copy manually.', 'err'); }
}

    navigator.share({ title: biz, text: msg, url: url })
      .then(function() { logAction('share_click', 'webshare'); })
      .catch(function(e) { if (e.name !== 'AbortError') shareViaWa(msg, url); });
  } else {
    // Fallback: copy link + offer WhatsApp
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() {
        toast('Link copied! Share anywhere 📋', 'ok', 3000);
      }).catch(function() { shareViaWa(msg, url); });
    } else {
      shareViaWa(msg, url);
    }
    logAction('share_click', 'fallback');
  }
}

function shareViaWa(msg, url) {
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank', 'noopener');
  toast('WhatsApp opened!', 'ok');
}


   // ── GREETING ──────────────────────────────────────────────────
function getGreeting() {
  var h = new Date().getHours();
  if (h >= 5  && h < 12) return { emoji: '🌤️', text: 'Good Morning' };
  if (h >= 12 && h < 17) return { emoji: '☀️',  text: 'Good Afternoon' };
  return { emoji: '🌙', text: 'Good Evening' };
}

   
// ── ANALYTICS ─────────────────────────────────────────────────
function logAction(type, value) {
  apiPost('logAnalytics', {
    analytics: {
      client_id:    CLIENT_ID,
      action_type:  type,
      action_value: value || '',
      device:       navigator.userAgent
    }
  }).catch(function() {});
}

// ── ERROR PAGE ────────────────────────────────────────────────
function showError(ico, title, msg) {
  var ls = document.getElementById('ls');
  var pg = document.getElementById('pg');
  if (ls) ls.classList.add('out');
  if (pg) {
    pg.style.display = 'block';
    pg.innerHTML = '<div class="err-page"><div class="err-ico">' + ico + '</div><div class="err-title">' + title + '</div><div class="err-txt">' + msg + '</div></div>';
  }
}

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(loadClient, 60);
});
</script>
