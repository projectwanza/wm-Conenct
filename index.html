<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff6a00">
<title>Business Profile</title>
<!-- Preconnect for speed -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   WANZA MARKETING — Premium SaaS UI v8
   Brand: Blue #0F52BA | Purple #6A0DAD | Orange #FF7A00
   ═══════════════════════════════════════════════ */

:root {
  /* ── BRAND CORE ── */
  --blue1:   #0F52BA;
  --blue2:   #1E90FF;
  --blue3:   #4AABFF;
  --purple1: #6A0DAD;
  --purple2: #9B30FF;
  --purple3: #C17AFF;
  --org1:    #FF7A00;
  --org2:    #FF9F00;
  --org3:    #FFD166;

  /* ── LEGACY ALIASES (keeps existing JS working) ── */
  --grn: #00c97e;
  --red: #ff4757;

  /* ── SYSTEM TOKENS ── */
  --bg:      #F0F4FF;
  --bg2:     #E8EEFF;
  --surf:    #ffffff;
  --card:    #ffffff;
  --txt:     #0D0F1A;
  --txt2:    #3D3F5A;
  --muted:   #8890B0;
  --bdr:     rgba(15,82,186,.10);
  --bdr2:    rgba(106,13,173,.14);
  --bdr3:    rgba(255,122,0,.18);

  /* ── SHADOWS ── */
  --shadow-sm: 0 2px 12px rgba(15,82,186,.08);
  --shadow-md: 0 6px 28px rgba(15,82,186,.13);
  --shadow-lg: 0 12px 48px rgba(106,13,173,.16);
  --shadow-org: 0 8px 32px rgba(255,122,0,.30);
  --shadow-blue: 0 8px 32px rgba(15,82,186,.28);
  --shadow-purple: 0 8px 32px rgba(106,13,173,.24);

  /* ── GRADIENTS ── */
  --grad-brand:  linear-gradient(135deg, #0F52BA 0%, #6A0DAD 55%, #FF7A00 100%);
  --grad-blue:   linear-gradient(135deg, #0F52BA, #1E90FF);
  --grad-purple: linear-gradient(135deg, #6A0DAD, #9B30FF);
  --grad-orange: linear-gradient(135deg, #FF7A00, #FF9F00, #FFD166);
  --grad-header: linear-gradient(135deg, #0A3A8A 0%, #0F52BA 30%, #6A0DAD 70%, #8B0DAD 100%);
  --grad-green:  linear-gradient(135deg, #00875A, #00C48C);
  --grad-wa:     linear-gradient(135deg, #075E54, #25D366);
  --grad-card:   linear-gradient(145deg, rgba(255,255,255,.95), rgba(240,244,255,.85));

  /* ── LAYOUT ── */
  --max: 560px;
  --r1: 10px; --r2: 16px; --r3: 22px; --r4: 28px; --pill: 999px;
  --pad: 20px;
}

/* ══ RESET ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Poppins', sans-serif;
  font-size: 15px; line-height: 1.6;
  background: var(--bg);
  color: var(--txt);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* Ambient background blobs */
body::before, body::after {
  content: ''; position: fixed; pointer-events: none; z-index: 0; border-radius: 50%;
}
body::before {
  width: 500px; height: 500px;
  top: -150px; left: -150px;
  background: radial-gradient(circle, rgba(15,82,186,.07) 0%, transparent 65%);
}
body::after {
  width: 600px; height: 600px;
  bottom: -200px; right: -200px;
  background: radial-gradient(circle, rgba(106,13,173,.07) 0%, transparent 65%);
}

/* ══ LOADER ══ */
#ls {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(160deg, #F0F4FF 0%, #E8EEFF 50%, #F5EEFF 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  transition: opacity .5s ease;
}
#ls.out { opacity: 0; pointer-events: none; }

.ld-logo {
  width: 76px; height: 76px; border-radius: 22px;
  background: var(--grad-brand);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem;
  box-shadow: 0 0 0 0 rgba(106,13,173,.4), var(--shadow-lg);
  animation: logoPulse 2s ease infinite;
}
@keyframes logoPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(106,13,173,.35), var(--shadow-lg); transform: scale(1); }
  50%       { box-shadow: 0 0 0 14px rgba(106,13,173,.0), var(--shadow-lg); transform: scale(1.04); }
}

.ld-ring {
  width: 38px; height: 38px;
  border: 3px solid rgba(106,13,173,.12);
  border-top-color: var(--purple1);
  border-right-color: var(--blue1);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }

.ld-txt {
  font-size: 10px; color: var(--muted);
  letter-spacing: 3px; text-transform: uppercase; font-weight: 600;
}

/* ══ PAGE WRAPPER ══ */
#pg {
  position: relative; z-index: 1;
  max-width: var(--max); margin: 0 auto;
  padding-bottom: 80px; display: none;
}

/* Entrance animations */
@keyframes up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
.au { animation: up .5s cubic-bezier(.22,1,.36,1) both; }
.d1 { animation-delay: .06s; } .d2 { animation-delay: .12s; }
.d3 { animation-delay: .18s; } .d4 { animation-delay: .24s; }
.d5 { animation-delay: .30s; } .d6 { animation-delay: .36s; }

/* ══ HEADER ══ */
.page-header {
  background: var(--grad-header);
  padding: 15px var(--pad);
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 30px rgba(10,58,138,.35);
  position: relative; overflow: hidden;
}
/* Glassmorphism sheen overlay */
.page-header::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.08) 0%, transparent 100%);
  pointer-events: none;
}
/* Bottom glow line */
.page-header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(255,122,0,.7), rgba(155,48,255,.8), rgba(30,144,255,.7), transparent);
}

.ph-brand { display: flex; align-items: center; gap: 10px; }
.ph-logo {
  width: 32px; height: 32px; border-radius: 9px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.28);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; overflow: hidden;
  backdrop-filter: blur(8px);
}
.ph-logo img { width: 100%; height: 100%; object-fit: cover; }
.ph-name {
  color: #fff; font-size: 14px; font-weight: 700; letter-spacing: .3px;
  text-shadow: 0 1px 8px rgba(0,0,0,.25);
}

.ph-share {
  background: rgba(255,255,255,.14);
  color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: var(--pill); padding: 6px 16px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  font-family: 'Poppins', sans-serif;
  backdrop-filter: blur(10px);
  transition: background .25s ease, transform .2s ease, box-shadow .25s ease;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
}
.ph-share:hover { background: rgba(255,255,255,.25); box-shadow: 0 4px 20px rgba(255,255,255,.15); }
.ph-share:active { transform: scale(.93); }

/* ══ HERO ══ */
.hero {
  padding: clamp(30px,7vw,46px) var(--pad) 22px;
  text-align: center; position: relative;
}

/* Profile image — glowing ring */
.biz-logo {
  width: clamp(90px,22vw,110px); height: clamp(90px,22vw,110px);
  border-radius: 50%; object-fit: cover;
  border: 3px solid #fff;
  box-shadow:
    0 0 0 4px rgba(106,13,173,.18),
    0 0 0 8px rgba(15,82,186,.09),
    0 12px 40px rgba(106,13,173,.22);
  margin: 0 auto; display: block;
  animation: ringPulse 3s ease infinite;
}
@keyframes ringPulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(106,13,173,.18), 0 0 0 8px rgba(15,82,186,.09), 0 12px 40px rgba(106,13,173,.22); }
  50%       { box-shadow: 0 0 0 5px rgba(106,13,173,.28), 0 0 0 12px rgba(15,82,186,.08), 0 16px 48px rgba(106,13,173,.32); }
}

.biz-logo-placeholder {
  width: clamp(90px,22vw,110px); height: clamp(90px,22vw,110px);
  border-radius: 50%;
  background: var(--grad-brand);
  margin: 0 auto; display: flex; align-items: center; justify-content: center;
  font-size: 2.8rem;
  box-shadow: 0 0 0 4px rgba(106,13,173,.18), 0 0 0 8px rgba(15,82,186,.09), 0 12px 40px rgba(106,13,173,.25);
  animation: ringPulse 3s ease infinite;
}

.biz-name {
  font-size: clamp(1.55rem,6.5vw,2.1rem); font-weight: 800; line-height: 1.2;
  background: var(--grad-brand);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  padding: 0 12px; margin-top: 16px;
  letter-spacing: -.3px;
}

.biz-type {
  display: inline-block; margin-top: 10px;
  background: var(--grad-blue);
  color: #fff; font-size: 10px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  border-radius: var(--pill); padding: 5px 18px;
  box-shadow: var(--shadow-blue);
}

.biz-addr {
  font-size: 12.5px; color: var(--muted);
  margin-top: 10px; padding: 0 16px; line-height: 1.5;
}
.biz-addr span { color: var(--org1); }

.biz-desc {
  font-size: 13px; color: var(--txt2);
  margin: 12px auto 0; max-width: 380px;
  line-height: 1.75; padding: 0 16px;
}

/* Gradient divider */
.hero-divider {
  margin: 20px auto 0; width: 64px; height: 4px; border-radius: 2px;
  background: var(--grad-brand);
  position: relative;
}
.hero-divider::after {
  content: '';
  position: absolute; inset: -4px -8px;
  background: var(--grad-brand);
  filter: blur(8px); opacity: .35; border-radius: 4px;
  z-index: -1;
}

/* ══ CTA BUTTONS ══ */
.cta { padding: 18px var(--pad) 10px; }
.cta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }

.cta-btn {
  flex: 1 1 80px; min-width: 80px;
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  min-height: 52px; padding: 0 18px;
  border-radius: var(--pill); border: none; cursor: pointer;
  font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 700;
  text-decoration: none; white-space: nowrap; color: #fff;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease, filter .2s ease;
  -webkit-user-select: none; user-select: none;
  position: relative; overflow: hidden;
}
/* Shine sweep on hover */
.cta-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,.22) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform .4s ease;
}
.cta-btn:hover::after { transform: translateX(100%); }
.cta-btn:active { transform: scale(.93); filter: brightness(.93); }
@media (hover: hover) {
  .cta-btn:hover { transform: translateY(-3px) scale(1.02); }
}

/* BRAND BUTTON COLORS — consistent with brand palette */
.btn-call {
  background: var(--grad-blue);
  box-shadow: var(--shadow-blue);
}
.btn-wa {
  background: var(--grad-wa);
  box-shadow: 0 8px 28px rgba(7,94,84,.30);
}
.btn-email {
  background: var(--grad-purple);
  box-shadow: var(--shadow-purple);
}

/* ══ PAY NOW — Primary CTA ══ */
.btn-pay-wrap { padding: 0 var(--pad) 16px; }
.btn-pay {
  width: 100%; min-height: 56px;
  background: var(--grad-orange);
  color: #fff; border: none; border-radius: var(--pill); cursor: pointer;
  font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 800;
  letter-spacing: .6px; text-decoration: none;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-org);
  animation: payPulse 2.4s ease-in-out infinite;
  transition: transform .2s ease;
}
.btn-pay::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.15) 0%, transparent 50%);
}
.btn-pay::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,.22) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform .5s ease;
}
.btn-pay:hover::after { transform: translateX(100%); }
.btn-pay:active { transform: scale(.97); }

@keyframes payPulse {
  0%, 100% { box-shadow: 0 6px 28px rgba(255,122,0,.38), 0 0 0 0 rgba(255,122,0,.25); }
  50%       { box-shadow: 0 10px 40px rgba(255,122,0,.60), 0 0 0 12px rgba(255,122,0,.0); }
}

/* ══ SECTION CARDS ══ */
.sec { padding: 0 var(--pad) 16px; }
.sec-card {
  background: var(--grad-card);
  border: 1px solid var(--bdr);
  border-radius: var(--r3); overflow: hidden;
  box-shadow: var(--shadow-md);
  backdrop-filter: blur(12px);
  transition: box-shadow .28s ease, transform .28s ease;
}
.sec-card:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-3px);
}
.sec-hd {
  padding: 15px 18px;
  border-bottom: 1px solid var(--bdr);
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, rgba(15,82,186,.04), rgba(106,13,173,.03));
}
.sec-ic { font-size: 1.1rem; }
.sec-tt {
  font-size: 14px; font-weight: 700;
  background: var(--grad-brand);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* ══ SOCIAL GRID ══ */
.soc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%,210px),1fr));
  gap: 10px; padding: 14px;
}
.soc-card {
  background: linear-gradient(145deg, #fff, #f5f0ff);
  border: 1px solid var(--bdr2); border-radius: var(--r2);
  padding: 13px 14px; display: flex; align-items: center; gap: 12px;
  cursor: pointer; text-decoration: none;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease, border-color .2s ease;
  min-height: 50px; overflow: hidden;
  -webkit-user-select: none; user-select: none;
}
.soc-card:active { transform: scale(.93); }
@media (hover: hover) {
  .soc-card:hover {
    transform: translateY(-4px) scale(1.01);
    border-color: var(--purple1);
    box-shadow: 0 12px 30px rgba(106,13,173,.15);
  }
}
.soc-ico {
  width: 40px; height: 40px; border-radius: 11px; overflow: hidden;
  background: linear-gradient(135deg, rgba(15,82,186,.10), rgba(106,13,173,.08));
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  border: 1px solid rgba(106,13,173,.14);
}
.soc-ico img { width: 100%; height: 100%; object-fit: cover; }
.soc-ico span { font-size: 1.2rem; line-height: 1; }
.soc-info { flex: 1; overflow: hidden; min-width: 0; }
.soc-nm {
  font-size: 13px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--txt);
}
.soc-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.soc-arr { color: var(--purple2); font-size: 1rem; flex-shrink: 0; font-weight: 700; }

/* ══ ADS CAROUSEL ══ */
.ads-sec { padding: 0 var(--pad) 16px; }
.ads-sec .sec-card { overflow: hidden; }
.ads-carousel { position: relative; overflow: hidden; border-radius: var(--r2); margin: 10px; }
.ads-track { display: flex; transition: transform .5s cubic-bezier(.4,0,.2,1); }
.ads-slide { flex: 0 0 100%; position: relative; cursor: pointer; overflow: hidden; }
.ads-slide img, .ads-slide video {
  width: 100%; max-height: 220px; object-fit: cover; display: block; border-radius: var(--r2);
}
.ads-slide-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,.65), transparent);
  padding: 22px 14px 14px; border-radius: 0 0 var(--r2) var(--r2);
}
.ads-slide-title { color: #fff; font-size: 13px; font-weight: 700; line-height: 1.3; }
.ads-action-btn {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 7px; background: rgba(255,255,255,.18); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,.32);
  color: #fff; font-size: 11px; font-weight: 600;
  font-family: 'Poppins', sans-serif;
  padding: 5px 13px; border-radius: var(--pill); cursor: pointer;
}
.ads-dots { display: flex; justify-content: center; gap: 6px; padding: 10px 0 4px; }
.ads-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--bdr2); transition: all .3s ease; cursor: pointer;
}
.ads-dot.on { background: var(--org1); width: 20px; border-radius: 4px; }
.ads-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.88); backdrop-filter: blur(6px);
  border: none; cursor: pointer; font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(0,0,0,.15); z-index: 2;
  transition: background .2s ease, transform .2s ease;
}
.ads-nav:hover { background: #fff; transform: translateY(-50%) scale(1.08); }
.ads-prev { left: 8px; }
.ads-next { right: 8px; }

/* ══ RATING CARD ══ */
.rate-sec { padding: 0 var(--pad) 16px; }
.rate-card {
  background: var(--grad-card);
  border: 1px solid var(--bdr); border-radius: var(--r3);
  padding: clamp(22px,5vw,34px) var(--pad); text-align: center;
  box-shadow: var(--shadow-md); backdrop-filter: blur(12px);
}
.rate-card h3 {
  font-size: 18px; font-weight: 800; margin-bottom: 6px;
  background: var(--grad-brand);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.rate-card p { font-size: 13px; color: var(--muted); margin-bottom: 22px; }

.stars { display: flex; justify-content: center; gap: clamp(4px,2vw,14px); }
.star {
  font-size: clamp(2.1rem,8.5vw,2.6rem);
  background: none; border: none; cursor: pointer;
  filter: grayscale(1) opacity(.22);
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), filter .15s ease;
  line-height: 1; min-width: 44px; min-height: 44px;
  display: inline-flex; align-items: center; justify-content: center;
  -webkit-user-select: none; user-select: none;
}
.star.on {
  filter: drop-shadow(0 2px 8px rgba(255,154,0,.55));
}
@media (hover: hover) {
  .star:hover { transform: scale(1.38); filter: drop-shadow(0 3px 10px rgba(255,122,0,.6)); }
}

/* ══ FEEDBACK ══ */
#fb-wrap { display: none; }
.fb-card {
  background: var(--grad-card); border: 1px solid var(--bdr); border-radius: var(--r3);
  padding: clamp(20px,5vw,28px) var(--pad); text-align: center; margin-top: 14px;
  box-shadow: var(--shadow-md);
}
.fb-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 5px; color: var(--txt); }
.fb-card p { font-size: 13px; color: var(--muted); margin-bottom: 15px; line-height: 1.55; }
.fb-ta {
  width: 100%; background: rgba(240,244,255,.8);
  border: 1.5px solid var(--bdr2); border-radius: var(--r2);
  color: var(--txt); padding: 13px; font-family: 'Poppins', sans-serif; font-size: 14px;
  resize: vertical; min-height: 92px; outline: none;
  transition: border-color .22s ease, box-shadow .22s ease; -webkit-appearance: none;
}
.fb-ta:focus { border-color: var(--purple1); box-shadow: 0 0 0 4px rgba(106,13,173,.10); }

.btn-pri {
  width: 100%; margin-top: 13px; height: 52px;
  background: var(--grad-blue);
  color: #fff; border: none; border-radius: var(--pill); cursor: pointer;
  font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 700;
  transition: transform .2s ease, box-shadow .2s ease;
  -webkit-user-select: none; user-select: none;
  box-shadow: var(--shadow-blue);
  position: relative; overflow: hidden;
}
.btn-pri::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: rgba(255,255,255,.10); border-radius: var(--pill) var(--pill) 0 0;
}
.btn-pri:active { transform: scale(.97); }
.btn-pri:disabled { opacity: .5; cursor: default; box-shadow: none; }

/* ══ REVIEWS ══ */
#rv-wrap { display: none; margin-top: 14px; }
.rv-list { display: flex; flex-direction: column; gap: 13px; }
.rv-card {
  background: var(--grad-card);
  border: 1px solid var(--bdr2);
  border-radius: var(--r3); padding: 20px;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-md);
}
.rv-card::before {
  content: '"'; position: absolute; top: -10px; left: 12px;
  font-size: 5.5rem; line-height: 1; pointer-events: none;
  background: var(--grad-brand);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;

<script>
// ════════════════════════════════════════════════════════════════
//  WANZA index.html v7 — Client Profile (All bugs fixed)
// ════════════════════════════════════════════════════════════════

// ── CONFIG — EDIT THIS ──────────────────────────────────────────
var GAS_URL = 'https://script.google.com/macros/s/AKfycbzASLoq4or9hC7nPjcQf-lSuTaoq6oJA5znqn-5UhIvKjFjXdmIqLdAbWyg1ea-VXF-/exec';
   
// ────────────────────────────────────────────────────────────────

var CLIENT_ID = (new URLSearchParams(location.search)).get('client_id') || '';
var CLIENT    = null;
var SETTINGS  = {};
var SOCIAL    = [];
var BANNERS   = [];
var ADS       = [];
var REVIEWS   = [];
var SEL_STAR  = 0;

// Throttle map
var _th = {};
function throttle(k, ms) {
  var now = Date.now();
  if (_th[k] && now - _th[k] < ms) return false;
  _th[k] = now;
  return true;
}

// Escape HTML
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── TOAST ─────────────────────────────────────────────────────
var _toastTimer;
function toast(msg, type, dur) {
  var el = document.getElementById('toast');
  if (!el) return;
  clearTimeout(_toastTimer);
  el.textContent = msg;
  el.className   = 'show ' + (type || '');
  _toastTimer = setTimeout(function() { el.className = ''; }, dur || 2800);
}

// ── API ───────────────────────────────────────────────────────
function apiGet(action, params, retries) {
  retries = (retries === undefined) ? 2 : retries;
  if (!GAS_URL) return Promise.reject(new Error('GAS_URL not configured'));
  var url = GAS_URL + '?action=' + encodeURIComponent(action);
  Object.keys(params || {}).forEach(function(k) {
    url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  });
  return fetch(url, { method: 'GET' })
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function(text) {
      var d; try { d = JSON.parse(text); } catch(e) { throw new Error('Invalid JSON'); }
      if (d && d.success === false) throw new Error(d.error || 'API error');
      return (d.data !== undefined) ? d.data : d;
    })
    .catch(function(e) {
      if (retries > 0) return new Promise(function(r) { setTimeout(r, 1200); }).then(function() { return apiGet(action, params, retries - 1); });
      throw e;
    });
}

function apiPost(action, body, retries) {
  retries = (retries === undefined) ? 1 : retries;
  if (!GAS_URL) return Promise.reject(new Error('GAS_URL not configured'));
  var payload = Object.assign({ action: action }, body || {});
  return fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload), redirect: 'follow' })
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function(text) {
      var d; try { d = JSON.parse(text); } catch(e) { throw new Error('Invalid JSON'); }
      if (d && d.success === false) throw new Error(d.error || 'API error');
      return (d.data !== undefined) ? d.data : d;
    })
    .catch(function(e) {
      if (retries > 0) return new Promise(function(r) { setTimeout(r, 1500); }).then(function() { return apiPost(action, body, retries - 1); });
      throw e;
    });
}

// ════════════════════════════════════════════════════════════════
//  LOAD CLIENT — Uses single combined API call for speed
// ════════════════════════════════════════════════════════════════
async function loadClient() {
  if (!GAS_URL) { showError('⚙️', 'Setup Required', 'GAS_URL not configured in index.html.'); return; }
  if (!CLIENT_ID) { showError('🔍', 'Client Not Found', 'No client_id in URL. Please scan a valid QR code.'); return; }

  try {
    // Single combined API call — much faster than 4 separate calls
    var result = await apiGet('getClientFull', { client_id: CLIENT_ID });

    // Map all fields correctly
    CLIENT   = result.client   || {};
    SETTINGS = result.settings || {};
    SOCIAL   = Array.isArray(result.social)   ? result.social   : [];
    BANNERS  = Array.isArray(result.banners)  ? result.banners  : [];
    ADS      = Array.isArray(result.ads)      ? result.ads      : [];

    // ✅ DEBUG: Log what we got (check browser console)
    console.log('📦 CLIENT:', CLIENT);
    console.log('⚙️ SETTINGS:', SETTINGS);
    console.log('📌 Footer will show → Name:', SETTINGS.company_name, '| Phone:', SETTINGS.phone, '| Email:', SETTINGS.email);

    render(CLIENT, SETTINGS, SOCIAL);
    render(CLIENT, SETTINGS, SOCIAL);
    renderBanners(BANNERS);

    var ls = document.getElementById('ls');
    var pg = document.getElementById('pg');
    if (ls) ls.classList.add('out');
    if (pg) pg.style.display = 'block';

    // Log visit asynchronously (non-blocking)
    setTimeout(function() { logAction('visit', shareUrl()); }, 500);

  } catch (err) {
    console.error('loadClient failed:', err);
    showError('❌', 'Connection Error',
      'Could not load profile. Check your internet connection.<br><small style="opacity:.55">' + esc(String(err.message || err)) + '</small>');
  }
}

// ── BANNER RENDER ─────────────────────────────────────────────
function renderBanners(banners) {
  if (!banners || !banners.length) return;
  var active = banners.filter(function(b) { return String(b.enabled).toUpperCase() === 'TRUE'; });
  if (!active.length) return;

  var bannerEl  = document.getElementById('offer-banner');
  var barEl     = document.getElementById('banner-bar');
  var tickerEl  = document.getElementById('banner-ticker');

  var first = active[0];
  barEl.style.background = first.bg_color || 'linear-gradient(135deg,#ff6a00,#ff9f00)';
  barEl.style.color       = first.text_color || '#ffffff';

  var texts = active.map(function(b) { return b.message; });
  var full  = texts.join('  •  ');
  tickerEl.innerHTML = '<span>' + esc(full) + '</span><span>' + esc(full) + '</span>';

  bannerEl.style.display = 'flex';
  document.getElementById('pg').style.paddingBottom = '100px';
}

function closeBanner() {
  var el = document.getElementById('offer-banner');
  if (el) el.style.display = 'none';
  document.getElementById('pg').style.paddingBottom = '60px';
}

// ── ADS CAROUSEL RENDER (NEW) ─────────────────────────────────
var _adIdx = 0;
var _adTimer = null;
var _adCount = 0;

function renderAds(ads) {
  if (!ads || !ads.length) return '';

  _adCount = ads.length;
  _adIdx   = 0;

  var slides = ads.map(function(ad, i) {
    var media = ad.media_type === 'video'
      ? '<video src="' + esc(ad.media_url) + '" autoplay muted loop playsinline style="width:100%;max-height:220px;object-fit:cover;display:block;border-radius:var(--r2)"></video>'
      : '<img src="' + esc(ad.media_url) + '" alt="' + esc(ad.title || 'Ad') + '" loading="lazy" style="width:100%;max-height:220px;object-fit:cover;display:block;border-radius:var(--r2)" onerror="this.style.display=\'none\'">';

    var actionLabel = ad.action_type === 'call' ? '📞 Call Now'
                    : ad.action_type === 'whatsapp' ? '💬 WhatsApp'
                    : '🔗 Learn More';

    var overlay = (ad.title || ad.redirect_url)
      ? '<div class="ads-slide-overlay">'
          + (ad.title ? '<div class="ads-slide-title">' + esc(ad.title) + '</div>' : '')
          + (ad.redirect_url ? '<button class="ads-action-btn" onclick="adAction(event,\'' + esc(ad.ad_id) + '\',\'' + esc(ad.redirect_url) + '\',\'' + esc(ad.action_type || 'link') + '\')">' + actionLabel + '</button>' : '')
          + '</div>'
      : '';

    return '<div class="ads-slide" onclick="adAction(event,\'' + esc(ad.ad_id) + '\',\'' + esc(ad.redirect_url) + '\',\'' + esc(ad.action_type || 'link') + '\')">'
      + media + overlay + '</div>';
  }).join('');

  var dots = ads.map(function(_, i) {
    return '<div class="ads-dot ' + (i === 0 ? 'on' : '') + '" onclick="goAdSlide(' + i + ')"></div>';
  }).join('');

  var nav = ads.length > 1
    ? '<button class="ads-nav ads-prev" onclick="adNav(event,-1)">‹</button>'
      + '<button class="ads-nav ads-next" onclick="adNav(event,1)">›</button>'
    : '';

  setTimeout(function() { startAdTimer(); }, 100);

  return '<div class="ads-sec au d6"><div class="sec-card">'
    + '<div class="sec-hd"><span class="sec-ic">📢</span><span class="sec-tt">Offers & Promotions</span></div>'
    + '<div class="ads-carousel">'
    + nav
    + '<div class="ads-track" id="ads-track"><div style="display:flex;width:' + (100*ads.length) + '%">'
    + slides + '</div></div>'
    + '</div>'
    + (ads.length > 1 ? '<div class="ads-dots" id="ads-dots">' + dots + '</div>' : '')
    + '</div></div>';
}

function goAdSlide(idx) {
  _adIdx = ((idx % _adCount) + _adCount) % _adCount;
  var track = document.getElementById('ads-track');
  if (track) track.style.transform = 'translateX(-' + (_adIdx * (100 / _adCount)) + '%)';
  document.querySelectorAll('.ads-dot').forEach(function(d, i) {
    d.classList.toggle('on', i === _adIdx);
  });
}

function adNav(e, dir) {
  e.stopPropagation();
  clearTimeout(_adTimer);
  goAdSlide(_adIdx + dir);
  startAdTimer();
}

function startAdTimer() {
  if (_adCount < 2) return;
  clearTimeout(_adTimer);
  _adTimer = setInterval(function() { goAdSlide(_adIdx + 1); }, 4000);
}

function adAction(e, adId, url, type) {
  e.stopPropagation();
  if (!url) return;
  logAction('ad_click', adId);
  if (type === 'call') { window.location.href = 'tel:' + url; }
  else if (type === 'whatsapp') { window.open('https://wa.me/' + url.replace(/\D/g,''), '_blank', 'noopener'); }
  else { window.open(url, '_blank', 'noopener'); }
}

// ── TOUCH SWIPE FOR ADS ───────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var touchStartX = 0;
  document.addEventListener('touchstart', function(e) {
    if (e.target.closest('.ads-carousel')) touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    if (!e.target.closest('.ads-carousel') || !touchStartX) return;
    var dx = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 40) {
      clearTimeout(_adTimer);
      goAdSlide(_adIdx + (dx > 0 ? 1 : -1));
      startAdTimer();
    }
    touchStartX = 0;
  }, { passive: true });
});

// ── PLATFORM UTILS ────────────────────────────────────────────
function platformEmoji(name) {
  var m = {
    facebook:'📘',instagram:'📸',twitter:'🐦',x:'𝕏',youtube:'▶️',
    tiktok:'🎵',linkedin:'💼',pinterest:'📌',snapchat:'👻',
    telegram:'✈️',whatsapp:'💬',threads:'🧵',website:'🌐',
    blog:'📝',twitch:'🎮',podcast:'🎙️'
  };
  return m[(name||'').toLowerCase().replace(/\s+/g,'')] || '🔗';
}

function fmtCount(n) {
  n = parseInt(n) || 0;
  if (!n) return null;
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/, '') + 'M+';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/, '') + 'K+';
  return n + '+';
}

  // Footer logo
  var footLogoHtml = settings.logo_url
    ? '<img class="foot-logo" src="' + esc(settings.logo_url) + '" alt="' + esc(compName) + '" loading="lazy" onerror="this.style.display=\'none\'">'
    : '<div class="foot-logo-placeholder">⭐</div>';

 document.getElementById('pg').innerHTML =
    headerHtml
    + '<div class="hero">'
    + logoHtml
    + '<div class="biz-name au d2">' + esc(client.name || '') + '</div>'
    + (client.business_type ? '<div class="au d2"><span class="biz-type">' + esc(client.business_type) + '</span></div>' : '')
    + (client.address ? '<div class="biz-addr au d3"><span>📍</span> ' + esc(client.address) + '</div>' : '')
    + (client.description ? '<div class="biz-desc au d3">' + esc(client.description) + '</div>' : '')
    + '<div class="hero-divider au d3"></div>'
    + '</div>'
    + ctaHtml
    + payHtml
    + socHtml
    + adsHtml
    + '<div class="rate-sec au d6"><div class="rate-card" id="rp">'
    + '<h3>⭐ Rate Your Experience</h3><p>How was your visit? Tap a star!</p>'
    + '<div class="stars" id="stars" role="group" aria-label="Star rating">' + stars + '</div>'
    + '</div>'
    + '<div id="fb-wrap"><div class="fb-card">'
    + '<h3>😔 Sorry to hear that!</h3><p>Tell us how we can improve!</p>'
    + '<textarea class="fb-ta" id="fb-txt" rows="4" placeholder="What went wrong?" aria-label="Feedback"></textarea>'
    + '<button class="btn-pri" id="fb-btn" onclick="submitFeedback()">📤 Send Feedback</button>'
    + '</div></div>'
    + '<div id="rv-wrap"><div class="rv-list" id="rv-list"></div>'
    + '<div class="hint">📋 Tap "Copy &amp; Review" → paste on Google ⭐</div></div>'
    + '</div>'
    + '<footer class="foot">'
    + footLogoHtml
    + '<div class="foot-name">' + esc(SETTINGS.company_name || compName) + '</div>'
    + '<div class="foot-tag">' + esc(SETTINGS.tagline || 'Grow Your Business with Digital Presence') + '</div>'
    + '<nav class="foot-links">'
    + (SETTINGS.phone ? '<a class="foot-link" href="tel:' + esc(SETTINGS.phone) + '">📞 ' + esc(SETTINGS.phone) + '</a>' : '')
    + (SETTINGS.email ? '<a class="foot-link" href="mailto:' + esc(SETTINGS.email) + '">✉️ ' + esc(SETTINGS.email) + '</a>' : '')
    + '</nav>'
    + '<!-- DEBUG: settings loaded at ' + new Date().toLocaleTimeString() + ' -->'
    + '</footer>';
}

// ── RATING ────────────────────────────────────────────────────
function setRating(r) {
  if (!throttle('rate', 600)) return;
  SEL_STAR = r;
  document.querySelectorAll('.star').forEach(function(s, i) {
    s.classList.toggle('on', i < r);
  });
  setTimeout(function() {
    if (r <= 3) {
      document.getElementById('fb-wrap').style.display = 'block';
      document.getElementById('rv-wrap').style.display = 'none';
      document.getElementById('fb-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else {
      document.getElementById('fb-wrap').style.display = 'none';
      loadReviews();
    }
  }, 250);
}

// ── REVIEWS ───────────────────────────────────────────────────
function loadReviews() {
  var list = document.getElementById('rv-list');
  list.innerHTML = '<div class="empty">⏳ Loading reviews…</div>';
  document.getElementById('rv-wrap').style.display = 'block';
  document.getElementById('rv-wrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  apiGet('getRandomReview', { client_id: CLIENT_ID })
    .then(function(data) {
      REVIEWS = Array.isArray(data) ? data : [];
      if (!REVIEWS.length) { list.innerHTML = '<div class="empty">No review templates yet.</div>'; return; }
      list.innerHTML = REVIEWS.map(function(rv, i) {
        return '<div class="rv-card" id="rc' + i + '">'
          + '<div class="rv-txt">' + esc(rv.review_text) + '</div>'
          + '<button class="copy-btn" id="cb' + i + '" onclick="copyReview(' + i + ',\'' + esc(rv.review_id) + '\')">📋 Copy &amp; Review</button>'
          + '</div>';
      }).join('');
    })
    .catch(function() {
      list.innerHTML = '<div class="empty">❌ Could not load reviews. Try again.</div>';
    });
}

// ── COPY ──────────────────────────────────────────────────────
function copyReview(idx, reviewId) {
  if (!throttle('cp' + idx, 3000)) { toast('Please wait…', ''); return; }
  var rv = REVIEWS[idx];
  if (!rv) return;

  function done() {
    var btn = document.getElementById('cb' + idx);
    if (btn) { btn.textContent = '✅ Copied!'; btn.classList.add('done'); }
    toast('Copied! Redirecting to Google…', 'ok', 3500);
    apiPost('markReviewUsed', { review_id: reviewId }).catch(function() {});
    logAction('review_redirect', CLIENT && CLIENT.google_review_link || '');
    logAction('copy_review', reviewId);
    setTimeout(function() {
      if (CLIENT && CLIENT.google_review_link) window.open(CLIENT.google_review_link, '_blank');
    }, 1600);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(rv.review_text).then(done).catch(function() { fbCopy(rv.review_text, done); });
  } else { fbCopy(rv.review_text, done); }
}

function fbCopy(text, cb) {
  try {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if (cb) cb();
  } catch(e) { toast('Please copy manually.', 'err'); }
}

// ── FEEDBACK ──────────────────────────────────────────────────
function submitFeedback() {
  if (!throttle('fb', 5000)) { toast('Please wait before submitting again.', ''); return; }
  var text = (document.getElementById('fb-txt').value || '').trim();
  if (!text) { toast('Please write your feedback first.', 'err'); return; }

  var btn = document.getElementById('fb-btn');
  btn.disabled = true; btn.textContent = '⏳ Sending…';

  apiPost('saveFeedback', {
    feedback: {
      client_id:     CLIENT_ID,
      rating:        SEL_STAR,
      feedback_text: text,
      device:        navigator.userAgent
    }
  })
  .then(function() {
    document.getElementById('fb-wrap').innerHTML =
      '<div class="fb-card"><div style="font-size:2.5rem;margin-bottom:10px">🙏</div>'
      + '<h3>Thank You!</h3><p style="font-size:13px;color:var(--muted)">We\'ll work on improving!</p></div>';
    toast('Feedback submitted. Thank you!', 'ok');
  })
  .catch(function() {
    btn.disabled = false; btn.textContent = '📤 Send Feedback';
    toast('Failed to send. Retry.', 'err');
  });
}

// ── SOCIAL ────────────────────────────────────────────────────
function socClick(id, platform, url) {
  if (!throttle('soc' + id, 1000)) return;
  logAction('social_click', platform);
  if (url) window.open(url, '_blank', 'noopener,noreferrer');
}

// ── SHARE (Web Share API + fallback) ─────────────────────────
function shareUrl() { return location.origin + location.pathname + '?client_id=' + encodeURIComponent(CLIENT_ID); }

function doShare() {
  if (!throttle('share', 2000)) return;
  var url = shareUrl();
  var biz = CLIENT ? (CLIENT.name || 'this business') : 'this business';
  var msg = 'Check out ' + biz + '\'s profile 👇\n' + url;

  // Web Share API — works on mobile
  if (navigator.share) {
    navigator.share({ title: biz, text: msg, url: url })
      .then(function() { logAction('share_click', 'webshare'); })
      .catch(function(e) { if (e.name !== 'AbortError') shareViaWa(msg, url); });
  } else {
    // Fallback: copy link + offer WhatsApp
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() {
        toast('Link copied! Share anywhere 📋', 'ok', 3000);
      }).catch(function() { shareViaWa(msg, url); });
    } else {
      shareViaWa(msg, url);
    }
    logAction('share_click', 'fallback');
  }
}

function shareViaWa(msg, url) {
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank', 'noopener');
  toast('WhatsApp opened!', 'ok');
}


   // ── GREETING ──────────────────────────────────────────────────
function getGreeting() {
  var h = new Date().getHours();
  if (h >= 5  && h < 12) return { emoji: '🌤️', text: 'Good Morning' };
  if (h >= 12 && h < 17) return { emoji: '☀️',  text: 'Good Afternoon' };
  return { emoji: '🌙', text: 'Good Evening' };
}

   
// ── ANALYTICS ─────────────────────────────────────────────────
function logAction(type, value) {
  apiPost('logAnalytics', {
    analytics: {
      client_id:    CLIENT_ID,
      action_type:  type,
      action_value: value || '',
      device:       navigator.userAgent
    }
  }).catch(function() {});
}

// ── ERROR PAGE ────────────────────────────────────────────────
function showError(ico, title, msg) {
  var ls = document.getElementById('ls');
  var pg = document.getElementById('pg');
  if (ls) ls.classList.add('out');
  if (pg) {
    pg.style.display = 'block';
    pg.innerHTML = '<div class="err-page"><div class="err-ico">' + ico + '</div><div class="err-title">' + title + '</div><div class="err-txt">' + msg + '</div></div>';
  }
}

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(loadClient, 60);
});
</script>
